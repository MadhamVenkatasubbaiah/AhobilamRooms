<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Temple History</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f0e8;
}

/* HEADING */
.title{
    text-align:center;
    font-size:45px;
    margin-top:40px;
    color:#8B5E00;
}

/* CARD CONTAINER */
.temple-container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
    margin-top:50px;
    padding-bottom:50px;
}

/* CARD */
.temple-card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
    cursor:pointer;
}

.temple-card:hover{
    transform:translateY(-8px);
}

/* IMAGE */
.temple-card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

/* CONTENT */
.temple-content{
    padding:20px;
    text-align:center;
}

.temple-content h2{
    color:#4d1f00;
    margin-bottom:15px;
}

.temple-content button{
    background:#d4a017;
    color:black;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    z-index:999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
}

.popup-content{
    background:white;
    width:80%;
    max-width:800px;
    margin:50px auto;
    border-radius:20px;
    overflow:hidden;
    position:relative;
}

.popup-content img{
    width:100%;
    height:400px;
    object-fit:cover;
}

.popup-text{
    padding:30px;
}

.popup-text h2{
    color:#8B5E00;
}

.close{
    position:absolute;
    top:15px;
    right:20px;
    font-size:35px;
    color:red;
    cursor:pointer;
}

/* MOBILE */
@media(max-width:900px){

.temple-container{
    grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.temple-container{
    grid-template-columns:1fr;
}

.title{
    font-size:32px;
}

}

</style>
</head>

<body>

<h1 class="title">Temple History</h1>

<div class="temple-container">

    <!-- CARD 1 -->
    <div class="temple-card" onclick="openPopup(
        'Upper Ahobilam Temple',
        'https://images.unsplash.com/photo-1524492412937-b28074a5d7da?q=80&w=1200&auto=format&fit=crop',
        'Upper Ahobilam is one of the most sacred temples dedicated to Lord Narasimha.'
    )">

        <img src="https://images.unsplash.com/photo-1524492412937-b28074a5d7da?q=80&w=1200&auto=format&fit=crop">

        <div class="temple-content">
            <h2>Upper Ahobilam Temple</h2>
            <button>View History</button>
        </div>

    </div>

    <!-- CARD 2 -->
    <div class="temple-card" onclick="openPopup(
        'Lower Ahobilam Temple',
        'https://images.unsplash.com/photo-1514222134-b57cbb8ce073?q=80&w=1200&auto=format&fit=crop',
        'Lower Ahobilam temple is famous for beautiful architecture.'
    )">

        <img src="https://images.unsplash.com/photo-1514222134-b57cbb8ce073?q=80&w=1200&auto=format&fit=crop">

        <div class="temple-content">
            <h2>Lower Ahobilam Temple</h2>
            <button>View History</button>
        </div>

    </div>

    <!-- CARD 3 -->
    <div class="temple-card" onclick="openPopup(
        'Jwala Narasimha',
        'https://images.unsplash.com/photo-1564507592333-c60657eea523?q=80&w=1200&auto=format&fit=crop',
        'Jwala Narasimha is believed to be the place where Hiranyakashipu was killed.'
    )">

        <img src="https://images.unsplash.com/photo-1564507592333-c60657eea523?q=80&w=1200&auto=format&fit=crop">

        <div class="temple-content">
            <h2>Jwala Narasimha</h2>
            <button>View History</button>
        </div>

    </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

    <div class="popup-content">

        <span class="close" onclick="closePopup()">&times;</span>

        <img id="popupImage">

        <div class="popup-text">
            <h2 id="popupTitle"></h2>
            <p id="popupDescription"></p>
        </div>

    </div>

</div>

<script>

function openPopup(title,image,description){

    document.getElementById('popup').style.display='block';

    document.getElementById('popupTitle').innerHTML=title;

    document.getElementById('popupImage').src=image;

    document.getElementById('popupDescription').innerHTML=description;
}

function closePopup(){
    document.getElementById('popup').style.display='none';
}

</script>

</body>
</html>
