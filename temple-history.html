<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple History - 9 Temples</title>
    <style>
        /* RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5f0e8;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        .title {
            text-align: left; 
            font-size: 45px;
            padding: 40px 40px 10px 40px;
            color: #8B5E00;
        }

        /* CONTAINER: Cards left nunchi start avvadaniki main logic ikkada undi */
        .temple-container {
            display: grid;
            /* Screen size ni batti automatic ga columns sardhukuntayi, kani left nunchi start avthayi */
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            width: 100%;
            padding: 20px 40px;
            justify-content: start; 
        }

        /* CARD STYLE */
        .temple-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .temple-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .temple-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .temple-content {
            padding: 20px;
            text-align: center;
        }

        .temple-content h2 {
            color: #4d1f00;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .temple-content button {
            background: #d4a017;
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .temple-content button:hover {
            background: #b88a14;
        }

        /* POPUP STYLES */
        .popup {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
        }

        .popup-content {
            background: white;
            width: 90%;
            max-width: 800px;
            margin: 5% auto;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .popup-content img {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }

        .popup-text {
            padding: 30px;
        }

        .popup-text h2 {
            color: #8B5E00;
            margin-bottom: 10px;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* RESPONSIVE */
        @media(max-width:600px){
            .temple-container { padding: 20px; }
            .title { font-size: 32px; padding-left: 20px; }
        }
    </style>
</head>
<body>

<h1 class="title">Temple History</h1>

<div class="temple-container" id="main-container">
    <!-- Cards will be generated here -->
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <span class="close" onclick="closePopup()">&times;</span>
    <div class="popup-content">
        <img id="popupImage" src="">
        <div class="popup-text">
            <h2 id="popupTitle"></h2>
            <p id="popupDescription"></p>
        </div>
    </div>
</div>

<script>
    // 9 Temples Data
    const temples = [
        { id: 1, name: "Temple 1", img: "https://images.unsplash.com/photo-1524492412937-b28074a5d7da?q=80&w=600", desc: "History of Temple 1 goes here asadadadadad..." },
        { id: 2, name: "Temple 2", img: "https://images.unsplash.com/photo-1514222134-b57cbb8ce073?q=80&w=600", desc: "History of Temple 2 goes here..." },
        { id: 3, name: "Temple 3", img: "https://images.unsplash.com/photo-1564507592333-c60657eea523?q=80&w=600", desc: "History of Temple 3 goes here..." },
        { id: 4, name: "Temple 4", img: "https://images.unsplash.com/photo-1548013146-72479768bada?q=80&w=600", desc: "History of Temple 4 goes here..." },
        { id: 5, name: "Temple 5", img: "https://images.unsplash.com/photo-1570168007204-dfb528c6958f?q=80&w=600", desc: "History of Temple 5 goes here..." },
        { id: 6, name: "Temple 6", img: "https://images.unsplash.com/photo-1532375810709-75b1da00537c?q=80&w=600", desc: "History of Temple 6 goes here..." },
        { id: 7, name: "Temple 7", img: "https://images.unsplash.com/photo-1605649487212-47bdab064df7?q=80&w=600", desc: "History of Temple 7 goes here..." },
        { id: 8, name: "Temple 8", img: "https://images.unsplash.com/photo-1512632578888-169bbbc64f33?q=80&w=600", desc: "History of Temple 8 goes here..." },
        { id: 9, name: "Temple 9", img: "https://images.unsplash.com/photo-1509099836639-18ba1795216d?q=80&w=600", desc: "History of Temple 9 goes here..." }
    ];

    const container = document.getElementById('main-container');

    // Generate HTML for 9 cards
    temples.forEach(temple => {
        const card = document.createElement('div');
        card.className = 'temple-card';
        card.onclick = () => openPopup(temple.name, temple.img, temple.desc);
        
        card.innerHTML = `
            <img src="${temple.img}" alt="${temple.name}">
            <div class="temple-content">
                <h2>${temple.name}</h2>
                <button>View History</button>
            </div>
        `;
        container.appendChild(card);
    });

    function openPopup(title, image, description) {
        document.getElementById('popup').style.display = 'block';
        document.getElementById('popupTitle').innerText = title;
        document.getElementById('popupImage').src = image;
        document.getElementById('popupDescription').innerText = description;
    }

    function closePopup() {
        document.getElementById('popup').style.display = 'none';
    }

    // Close popup on outside click
    window.onclick = function(event) {
        if (event.target == document.getElementById('popup')) {
            closePopup();
        }
    }
</script>

</body>
</html>
