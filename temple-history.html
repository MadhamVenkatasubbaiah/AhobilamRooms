<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple History</title>
    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f0e8;
            overflow-x: hidden;
        }

        .title {
            text-align: left; /* Left ki align chesam */
            font-size: 45px;
            padding: 20px 40px 0 40px;
            margin-bottom: 20px;
            color: #8B5E00;
        }

        .temple-container {
            display: grid;
            /* Ekada 1fr badulu auto-fill vaadithe, cards left nunchi start avthayi */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            padding: 20px 40px;
            justify-content: start; /* Idi main change */
        }

        /* CARD */
        .temple-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            cursor: pointer;
            width: 100%; /* Grid column width ni follow avthundi */
        }

        .temple-card:hover {
            transform: translateY(-8px);
        }

        /* IMAGE */
        .temple-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        /* CONTENT */
        .temple-content {
            padding: 20px;
            text-align: center;
        }

        .temple-content h2 {
            color: #4d1f00;
            margin-bottom: 15px;
        }

        .temple-content button {
            background: #d4a017;
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* POPUP styles ikkada same untayi... */
        .popup {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
        }

        .popup-content {
            background: white;
            width: 80%;
            max-width: 800px;
            margin: 50px auto;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .popup-content img {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }

        .popup-text {
            padding: 30px;
        }

        .popup-text h2 {
            color: #8B5E00;
            margin-bottom: 15px;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 35px;
            color: red;
            cursor: pointer;
        }

        /* MOBILE RESPONSIVE */
        @media(max-width:900px){
            .temple-container{
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }

        @media(max-width:600px){
            .temple-container{
                grid-template-columns: 1fr;
                padding: 20px;
            }
            .title{
                font-size: 32px;
                padding-left: 20px;
            }
        }
    </style>
</head>
<body>

<h1 class="title">Temple History</h1>

<div class="temple-container">
    <div class="temple-card" onclick="openPopup('Temple 1', 'https://images.unsplash.com/photo-1524492412937-b28074a5d7da?q=80&w=1200&auto=format&fit=crop', 'Temple 1 history details here.')">
        <img src="https://images.unsplash.com/photo-1524492412937-b28074a5d7da?q=80&w=1200&auto=format&fit=crop">
        <div class="temple-content">
            <h2>Temple 1</h2>
            <button>View History</button>
        </div>
    </div>

    <div class="temple-card" onclick="openPopup('Temple 2', 'https://images.unsplash.com/photo-1514222134-b57cbb8ce073?q=80&w=1200&auto=format&fit=crop', 'Temple 2 history details here.')">
        <img src="https://images.unsplash.com/photo-1514222134-b57cbb8ce073?q=80&w=1200&auto=format&fit=crop">
        <div class="temple-content">
            <h2>Temple 2</h2>
            <button>View History</button>
        </div>
    </div>

    </div>

<div class="popup" id="popup">
    <div class="popup-content">
        <span class="close" onclick="closePopup()">&times;</span>
        <img id="popupImage">
        <div class="popup-text">
            <h2 id="popupTitle"></h2>
            <p id="popupDescription"></p>
        </div>
    </div>
</div>

<script>
    function openPopup(title, image, description){
        document.getElementById('popup').style.display='block';
        document.getElementById('popupTitle').innerHTML = title;
        document.getElementById('popupImage').src = image;
        document.getElementById('popupDescription').innerHTML = description;
    }

    function closePopup(){
        document.getElementById('popup').style.display='none';
    }
</script>

</body>
</html>
