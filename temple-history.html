<style>

html, body{
    margin:0;
    padding:0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f0e8;
}
/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f0e8;
}

.title{
    text-align:left;
    font-size:45px;
    padding-top:0px;
    margin-bottom:20px;
    color:#8B5E00;
}

.temple-container{
    width:90%;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
    padding-bottom:50px;
}

/* CARD */
.temple-card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
    cursor:pointer;
}

.temple-card:hover{
    transform:translateY(-8px);
}

/* IMAGE */
.temple-card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

/* CONTENT */
.temple-content{
    padding:20px;
    text-align:center;
}

.temple-content h2{
    color:#4d1f00;
    margin-bottom:15px;
}

.temple-content button{
    background:#d4a017;
    color:black;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    z-index:999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
}

.popup-content{
    background:white;
    width:80%;
    max-width:800px;
    margin:50px auto;
    border-radius:20px;
    overflow:hidden;
    position:relative;
}

.popup-content img{
    width:100%;
    height:400px;
    object-fit:cover;
}

.popup-text{
    padding:30px;
}

.popup-text h2{
    color:#8B5E00;
    margin-bottom:15px;
}

.close{
    position:absolute;
    top:15px;
    right:20px;
    font-size:35px;
    color:red;
    cursor:pointer;
}

/* MOBILE */
@media(max-width:900px){

.temple-container{
    grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.temple-container{
    grid-template-columns:1fr;
}

.title{
    font-size:32px;
}

}

</style>

</head>

<script>

function openPopup(title,image,description){

    document.getElementById('popup').style.display='block';

    document.getElementById('popupTitle').innerHTML=title;

    document.getElementById('popupImage').src=image;

    document.getElementById('popupDescription').innerHTML=description;
}

function closePopup(){
    document.getElementById('popup').style.display='none';
}

</script>
