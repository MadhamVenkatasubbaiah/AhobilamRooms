<!DOCTYPE html>
<html>
<head>
    <title>Rooms - Ahobilam Rooms</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
        }

        .room-card {
            border: 1px solid #ccc;
            width: 300px;
            margin: 20px auto;
            padding: 15px;
            border-radius: 10px;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>Our Rooms</h1>
</header>

<div class="room-card">
    <img src="logo.png" alt="Deluxe Room">
    <h3>Deluxe Room</h3>
    <p>Comfortable stay with AC and WiFi</p>
</div>

<div class="room-card">
    <img src="large.png" alt="Family Room">
    <h3>Family Room</h3>
    <p>Perfect for families</p>
</div>

</body>
</html>
