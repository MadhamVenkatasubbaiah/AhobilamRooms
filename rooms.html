<html>
<head>
<title>Rooms - Ahobilam Rooms</title>

<style>

body{
font-family: Arial;
background:#FFF8E1;
margin:0;
text-align:center;
}

/* Rooms container */
.rooms-container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding:40px;
}

/* Room card */
.room-card{
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
width:300px;
padding:15px;
}

/* Image */
.room-card img{
width:100%;
border-radius:10px;
}

/* Booking button */
.book-btn{
background:#27ae60;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

.book-btn:hover{
background:#219150;
}

</style>
</head>

<body>

<h1>Welcome to Rajeshwari Complex </h1>
    
<button onclick="location.href='index.html'">
    ⬅ Back to Home
</button>

<div class="rooms-container">

    <div class="room-card">
        <img src="3bed.jpeg" alt="Deluxe Room">
        <h3>Deluxe Room</h3>
        <p>Comfortable stay with AC and WiFi</p>

        <button class="book-btn"
        onclick="location.href='tel:+917675962840'">
        Book Now 
        Price - 1600₹
        </button>
    </div>

    <div class="room-card">
        <img src="2-bed.jpeg" alt="Family Room">
        <h3>Family Room</h3>
        <p>Comfortable stay with AC and WiFi</p>

        <button class="book-btn"
        onclick="location.href='tel:+917675962840'">
        Book Now Price - 1200₹
        </button>
    </div>

</div>

</body>
</html>
